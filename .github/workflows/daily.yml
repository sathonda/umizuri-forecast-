name: 釣果予報を毎日更新

on:
  schedule:
    - cron: "10 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ジョブ1: データ収集・学習・予報生成 → site/ をアーティファクトに
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 予報サイトを生成
        run: python build_site.py

      - name: データとモデルを保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add umizuri_catch.csv umizuri_clean.csv umizuri_features.csv model_*.txt tomorrow.txt || true
          git commit -m "自動更新" || echo "変更なし"
          git push || echo "変更なし"

      - name: Pages 用に site/ をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ジョブ2: 公開だけを担当(ジョブ1の完了後に動く)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へ公開
        id: deployment
        uses: actions/deploy-pages@v4
