name: 釣果予報を毎日更新

# いつ動くか
on:
  schedule:
    # UTC の 21:00 = 日本時間の朝 6:00。GitHub の時刻は常に UTC なので変換して指定。
    # (混雑を避けるため 0分ちょうどは外して 21:10 にしています)
    - cron: "10 21 * * *"
  workflow_dispatch:   # 「Run workflow」ボタンで手動実行も可能

# GitHub Pages へ公開するための権限
permissions:
  contents: write      # 更新したデータ・モデルをリポジトリに保存し直す
  pages: write         # Pages へ公開
  id-token: write      # Pages デプロイの認証

# 同時実行を防ぐ(前回が動いていたら待つ)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. リポジトリを取り出す
      - name: リポジトリを取得
        uses: actions/checkout@v4

      # 2. Python を用意
      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 依存ライブラリを入れる(pip キャッシュで高速化)
      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. パイプラインを実行(収集→学習→予報→site/へ)
      - name: 予報サイトを生成
        run: python build_site.py

      # 5. 更新したデータ・モデルをリポジトリへ保存(次回の差分更新のため)
      #    site/ は公開専用なのでコミット対象から外す。
      - name: データとモデルを保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add umizuri_catch.csv umizuri_clean.csv umizuri_features.csv model_*.txt tomorrow.txt || true
          git commit -m "自動更新: $(date -u +%Y-%m-%d)" || echo "変更なし(コミットせず)"
          git push || echo "push する変更なし"

      # 6. site/ を GitHub Pages 用にアップロード
      - name: Pages 用に site/ をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # 7. GitHub Pages へ公開
      - name: GitHub Pages へ公開
        uses: actions/deploy-pages@v4
